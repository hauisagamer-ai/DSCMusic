name: yt-dlp Debug (Deno)

on:
  workflow_dispatch:
    inputs:
      song_url:
        description: "YouTube / YouTube Music link"
        required: true
        default: "https://www.youtube.com/watch?v=aBhrEv5Z7uc"
      player_client:
        description: "player_client (used for youtube.com — music.youtube.com always forces web_music)"
        required: true
        default: "mweb"
        type: choice
        options:
          - mweb
          - tv
          - web
          - web_music
          - default
          - web_safari
          - android
          - android_music
          - ios
          - ios_music
          - tv_simply
          - android_vr

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Deno is yt-dlp's recommended, default-enabled JS runtime for EJS.
      # No --js-runtimes flag is even required once it's on PATH.
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Environment versions
        run: |
          deno --version
          which deno
          python --version

      # "[default]" pulls in the yt-dlp-ejs version yt-dlp itself pins in
      # its pyproject.toml — avoids manually guessing a compatible version.
      - name: Install yt-dlp (with matched yt-dlp-ejs)
        run: |
          python -m pip install --upgrade pip
          pip install -U "yt-dlp[default]"
          echo "--- installed version ---"
          yt-dlp --version

      # Required to bypass 403s on sign-in/cookie-based clients (web, tv,
      # mweb, web_music). Runs in script mode using the Deno already set
      # up above — no separate server process needed.
      - name: Install PO Token provider (bgutil, script mode)
        run: pip install -U bgutil-ytdlp-pot-provider

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Write cookies (optional)
        run: |
          if [ -n "${{ secrets.YTDLP_COOKIES_B64 }}" ]; then
            echo "${{ secrets.YTDLP_COOKIES_B64 }}" | base64 -d > cookies.txt
            wc -l cookies.txt
          else
            echo "no cookies secret set, skipping"
          fi
        continue-on-error: true

      - name: Run yt-dlp -F (verbose)
        run: |
          COOKIE_FLAG=""
          [ -f cookies.txt ] && COOKIE_FLAG="--cookies cookies.txt"
          CLIENT="${{ github.event.inputs.player_client }}"
          URL="${{ github.event.inputs.song_url }}"
          # music.youtube.com always uses web_music; youtube.com uses the
          # dropdown-selected client (default mweb).
          case "$URL" in
            *music.youtube.com*) CLIENT="web_music" ;;
          esac
          echo "Using player_client: $CLIENT"
          CLIENT_ARG=""
          if [ "$CLIENT" != "default" ]; then
            CLIENT_ARG="--extractor-args youtube:player_client=$CLIENT"
          fi
          # android/ios clients reject cookies outright — yt-dlp silently
          # drops the whole client if cookies are passed alongside them.
          case "$CLIENT" in
            android*|ios*) COOKIE_FLAG="" ;;
          esac
          yt-dlp \
            --js-runtimes deno \
            $CLIENT_ARG \
            -F "$URL" \
            $COOKIE_FLAG \
            -v 2>&1 | tee ytdlp_verbose.log
          echo "--- PO token providers detected ---"
          grep -i "pot] PO Token Providers" ytdlp_verbose.log || echo "none found"

      - name: Extract key diagnostic lines
        if: always()
        run: |
          echo "=== JS runtime detection + solver lines ==="
          grep -i "jsc:\|solving\|EJS\|JS runtimes\|yt_dlp_ejs" ytdlp_verbose.log || echo "none found"
          echo ""
          echo "=== Available formats ==="
          grep -A100 "Available formats" ytdlp_verbose.log || echo "none found"

      - name: Download song (audio)
        run: |
          COOKIE_FLAG=""
          [ -f cookies.txt ] && COOKIE_FLAG="--cookies cookies.txt"
          CLIENT="${{ github.event.inputs.player_client }}"
          URL="${{ github.event.inputs.song_url }}"
          case "$URL" in
            *music.youtube.com*) CLIENT="web_music" ;;
          esac
          echo "Using player_client: $CLIENT"
          CLIENT_ARG=""
          if [ "$CLIENT" != "default" ]; then
            CLIENT_ARG="--extractor-args youtube:player_client=$CLIENT"
          fi
          case "$CLIENT" in
            android*|ios*) COOKIE_FLAG="" ;;
          esac
          yt-dlp \
            --js-runtimes deno \
            $CLIENT_ARG \
            -f "bestaudio/best" \
            -x --audio-format mp3 \
            -o "%(title)s.%(ext)s" \
            "$URL" \
            $COOKIE_FLAG \
            -v 2>&1 | tee ytdlp_download.log
          echo "--- downloaded file(s) ---"
          ls -lh *.mp3

      - name: Upload downloaded song
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-song
          path: |
            *.mp3
            ytdlp_download.log

      - name: Upload full verbose log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ytdlp-verbose-log
          path: ytdlp_verbose.log
